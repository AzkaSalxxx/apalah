<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hitung Harga Per Item</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
  <main class="app">
    <h1>Hitung Harga Per Item</h1>
    <p>Upload foto struk/menu, edit data jika perlu, lalu hitung harga setelah total.</p>

    <section class="card">
      <input type="file" id="imageInput" accept="image/*" />
      <img id="preview" alt="Preview Foto" />

      <div class="buttons">
        <button onclick="readImage()">Baca Foto</button>
        <button onclick="addRow()">Tambah Item</button>
        <button onclick="loadSample()">Contoh Data</button>
        <button onclick="calculate()">Hitung</button>
        <button onclick="copyResult()">Salin Hasil</button>
        <button class="danger" onclick="resetAll()">Reset</button>
      </div>

      <p id="status"></p>
    </section>

    <section class="card">
      <label>Total Akhir</label>
      <input type="number" id="finalTotal" placeholder="Contoh: 44000" />
    </section>

    <section class="card table-wrap">
      <table>
        <thead>
          <tr>
            <th>Nama Item</th>
            <th>Jumlah</th>
            <th>Harga Awal</th>
            <th>Harga Setelah Total</th>
            <th>Harga Per Item</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="itemBody"></tbody>
      </table>
    </section>

    <section class="card">
      <h2>Hasil</h2>
      <pre id="resultBox">Belum ada hasil.</pre>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
